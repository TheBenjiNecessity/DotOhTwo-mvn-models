version: 0.2

# Required CodeBuild environment variables:
#   CODEARTIFACT_DOMAIN        - Your CodeArtifact domain name
#   CODEARTIFACT_DOMAIN_OWNER  - AWS account ID that owns the domain
#   CODEARTIFACT_REPO          - CodeArtifact repository name
#   AWS_DEFAULT_REGION         - AWS region (set automatically by CodeBuild)
#
# Required IAM permissions for the CodeBuild role:
#   codeartifact:GetAuthorizationToken
#   codeartifact:PublishPackageVersion
#   codeartifact:PutPackageMetadata
#   sts:GetServiceBearerToken

phases:
    install:
        runtime-versions:
            java: corretto21

    pre_build:
        commands:
            - echo Fetching CodeArtifact authorization token...
            - export CODEARTIFACT_TOKEN=$(aws codeartifact get-authorization-token --domain $CODEARTIFACT_DOMAIN --domain-owner $CODEARTIFACT_DOMAIN_OWNER --query authorizationToken --output text)
            - mkdir -p /root/.m2
            - printf '<settings><servers><server><id>codeartifact</id><username>aws</username><password>%s</password></server></servers></settings>' "$CODEARTIFACT_TOKEN" > /root/.m2/settings.xml

    build:
        commands:
            - echo Running tests...
            - mvn clean verify

    post_build:
        commands:
            - echo Deploying to CodeArtifact...
            - export CODEARTIFACT_TOKEN=$(aws codeartifact get-authorization-token --domain $CODEARTIFACT_DOMAIN --domain-owner $CODEARTIFACT_DOMAIN_OWNER --query authorizationToken --output text)
            - printf '<settings><servers><server><id>codeartifact</id><username>aws</username><password>%s</password></server></servers></settings>' "$CODEARTIFACT_TOKEN" > /root/.m2/settings.xml
            - export CODEARTIFACT_REPO_URL=https://${CODEARTIFACT_DOMAIN}-${CODEARTIFACT_DOMAIN_OWNER}.d.codeartifact.${AWS_DEFAULT_REGION}.amazonaws.com/maven/${CODEARTIFACT_REPO}/
            - mvn deploy -DskipTests -DaltDeploymentRepository=codeartifact::default::$CODEARTIFACT_REPO_URL

artifacts:
    files:
        - target/models-*.jar
